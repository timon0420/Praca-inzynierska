services:
  analysis-worker:
    build:
      context: "./System sterowania"
      dockerfile: Dockerfile.backend
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-development-token}
      PORT: 8090
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-server:
    build:
      context: ./websocket
    environment:
      ANALYSIS_SERVICE_URL: http://analysis-worker:8090
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-development-token}
      ALLOWED_ORIGIN: http://localhost:10000
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      analysis-worker:
        condition: service_healthy

  frontend:
    build:
      context: "./System transmisji wideo"
      args:
        VITE_API_BASE_URL: http://localhost:8080
    environment:
      PORT: 10000
    ports:
      - "10000:10000"
    depends_on:
      - control-server
