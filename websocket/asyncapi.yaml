asyncapi: 3.0.0
info:
  title: Session Manipulator Streaming API
  version: 3.0.0
  description: Sesyjny transport obrazu z przeglądarki i kątów obliczanych przez backend do Unity.

servers:
  local:
    host: localhost:8080
    protocol: ws
  production:
    host: websocket-inzynierka.onrender.com
    protocol: wss

channels:
  browser:
    address: /ws/browser?token={token}
    parameters:
      token:
        description: Token przeglądarki zwrócony przez POST /api/sessions.
    messages:
      jpegFrame:
        $ref: '#/components/messages/JpegFrame'
      status:
        $ref: '#/components/messages/Status'
      analysis:
        $ref: '#/components/messages/Analysis'
      analysisError:
        $ref: '#/components/messages/AnalysisError'
  unity:
    address: /ws/unity?token={token}
    parameters:
      token:
        description: Token roli unity zwrócony przez POST /api/sessions/pair.
    messages:
      angles:
        $ref: '#/components/messages/Angles'

operations:
  browserSendsJPEG:
    action: send
    channel:
      $ref: '#/channels/browser'
    messages:
      - $ref: '#/channels/browser/messages/jpegFrame'
  browserReceivesStatus:
    action: receive
    channel:
      $ref: '#/channels/browser'
    messages:
      - $ref: '#/channels/browser/messages/status'
  browserReceivesAnalysis:
    action: receive
    channel:
      $ref: '#/channels/browser'
    messages:
      - $ref: '#/channels/browser/messages/analysis'
      - $ref: '#/channels/browser/messages/analysisError'
  unityReceivesAngles:
    action: receive
    channel:
      $ref: '#/channels/unity'
    messages:
      - $ref: '#/channels/unity/messages/angles'

components:
  messages:
    JpegFrame:
      name: JpegFrame
      contentType: image/jpeg
      payload:
        type: string
        format: binary
        maxLength: 204800
    Angles:
      name: Angles
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AnglesPayload'
    Analysis:
      name: Analysis
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AnalysisPayload'
    AnalysisError:
      name: AnalysisError
      contentType: application/json
      payload:
        type: object
        required: [type, message]
        properties:
          type:
            const: analysis_error
          message:
            type: string
    Status:
      name: Status
      contentType: application/json
      payload:
        type: object
        required: [type, analysis, unity]
        properties:
          type:
            const: status
          analysis:
            enum: [ready, unavailable]
          unity:
            type: boolean

  schemas:
    AnalysisPayload:
      type: object
      required: [type, detected, processingMs, sequence]
      properties:
        type:
          const: analysis
        detected:
          type: boolean
        angles:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: number
            minimum: 0
            maximum: 180
        processingMs:
          type: number
          minimum: 0
        sequence:
          type: integer
          minimum: 1
    AnglesPayload:
      type: object
      required: [type, angles, timestamp, sequence]
      properties:
        type:
          const: angles
        angles:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: number
            minimum: 0
            maximum: 180
        timestamp:
          type: number
        sequence:
          type: integer
          minimum: 1
