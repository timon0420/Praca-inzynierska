"asyncapi: 3.1.0\ninfo:\n  title: Gesture Broadcast API\n  version: 1.0.0\n  description: API do przesyłania danych o gestach przez WebSockets.\nservers:\n  local:\n    host: 'localhost:8080'\n    protocol: ws\nchannels:\n  gestureChannel:\n    address: /ws\n    summary: Główny kanał komunikacji dla gestów.\n    messages:\n      gestureUpdate:\n        $ref: '#/components/messages/GestureUpdate'\noperations:\n  sendGesture:\n    action: send\n    channel:\n      $ref: '#/channels/gestureChannel'\n    summary: Klient wysyła dane o gestach (6 kątów).\n  receiveBroadcast:\n    action: receive\n    channel:\n      $ref: '#/channels/gestureChannel'\n    summary: Serwer rozsyła dane do wszystkich podłączonych klientów.\ncomponents:\n  messages:\n    GestureUpdate:\n      name: GestureUpdate\n      title: Aktualizacja gestu\n      payload:\n        $ref: '#/components/schemas/GestureData'\n  schemas:\n    GestureData:\n      type: object\n      properties:\n        angles:\n          type: array\n          items:\n            type: number\n            minimum: 0\n            maximum: 180\n          minItems: 6\n          maxItems: 6\n        timestamp:\n          type: number\n          description: Unix timestamp (float64)\n      required:\n        - angles\n        - timestamp\n"